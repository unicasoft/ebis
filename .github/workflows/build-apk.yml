name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Find Android SDK & accept licenses
        run: |
          # Runner'daki mevcut Android SDK'yı bul
          ANDROID_SDK_PATH="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_SDK_PATH=$ANDROID_SDK_PATH" >> $GITHUB_ENV
          echo "SDK: $ANDROID_SDK_PATH"
          ls "$ANDROID_SDK_PATH" || echo "Klasor bulunamadi"
          # build-tools kur
          yes | $ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" || true
          ls "$ANDROID_SDK_PATH/build-tools/" || true

      - name: Configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          SDK="${ANDROID_SDK_PATH:-$ANDROID_HOME}"
          JDK="$JAVA_HOME"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JDK" "$SDK" > $HOME/.bubblewrap/config.json
          echo "Config:"
          cat $HOME/.bubblewrap/config.json
          echo "SDK build-tools:"
          ls "$SDK/build-tools/" 2>/dev/null || echo "build-tools yok"

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks

      - name: Create twa-manifest.json
        run: |
          mkdir -p /tmp/twa-build
          cat > /tmp/twa-build/twa-manifest.json << 'JSONEOF'
          {
            "packageId": "com.unicasoft.unibar",
            "host": "unicasoft.github.io",
            "name": "UNIBAR",
            "launcherName": "UNIBAR",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a1628",
            "navigationColor": "#0a1628",
            "backgroundColor": "#0a1628",
            "enableNotifications": false,
            "startUrl": "/ebis/",
            "iconUrl": "https://unicasoft.github.io/ebis/icons/icon-512.png",
            "maskableIconUrl": "https://unicasoft.github.io/ebis/icons/icon-maskable.png",
            "appVersion": "32",
            "appVersionCode": 32,
            "signingKey": {"path": "/tmp/karekod.jks", "alias": "karekod"},
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://unicasoft.github.io/ebis/",
            "minSdkVersion": 21,
            "features": {},
            "alphaDependencies": {"enabled": false},
            "additionalTrustedOrigins": [],
            "shortcuts": []
          }
          JSONEOF

      - name: Bubblewrap Build
        working-directory: /tmp/twa-build
        run: |
          bubblewrap build \
            --signingKeyPath /tmp/karekod.jks \
            --signingKeyAlias karekod \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unibar-apk
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "UNIBAR APK"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
