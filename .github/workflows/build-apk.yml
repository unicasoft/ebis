name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Patch Bubblewrap SDK validation
        run: |
          # validateSdk fonksiyonunu bul ve her zaman true döndürecek şekilde patch et
          SDK_FILE=$(find /usr/local/lib/node_modules/@bubblewrap/core/dist/lib -name "AndroidSdk.js" 2>/dev/null | head -1)
          echo "Patch: $SDK_FILE"
          # validateSdk metodunu always-true yapıyoruz
          sed -i 's/async validateSdk()/async validateSdk_ORIGINAL()/g' "$SDK_FILE"
          sed -i 's/validateSdk_ORIGINAL/validateSdk_ORIG/g' "$SDK_FILE"
          # Yeni validateSdk ekle
          sed -i 's/async validateSdk_ORIG/async validateSdk() { return true; }\n    async validateSdk_ORIG/g' "$SDK_FILE"
          echo "Patch OK"
          grep -n "validateSdk" "$SDK_FILE" | head -5

      - name: Configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$SDK" > $HOME/.bubblewrap/config.json
          cat $HOME/.bubblewrap/config.json

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks

      - name: Create twa-manifest.json
        run: |
          mkdir -p /tmp/twa-build
          cat > /tmp/twa-build/twa-manifest.json << 'JSONEOF'
          {
            "packageId": "com.unicasoft.unibar",
            "host": "unicasoft.github.io",
            "name": "UNIBAR",
            "launcherName": "UNIBAR",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a1628",
            "navigationColor": "#0a1628",
            "backgroundColor": "#0a1628",
            "enableNotifications": false,
            "startUrl": "/ebis/",
            "iconUrl": "https://unicasoft.github.io/ebis/icons/icon-512.png",
            "maskableIconUrl": "https://unicasoft.github.io/ebis/icons/icon-maskable.png",
            "appVersion": "32",
            "appVersionCode": 32,
            "signingKey": {"path": "/tmp/karekod.jks", "alias": "karekod"},
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://unicasoft.github.io/ebis/",
            "minSdkVersion": 21,
            "features": {},
            "alphaDependencies": {"enabled": false},
            "additionalTrustedOrigins": [],
            "shortcuts": []
          }
          JSONEOF

      - name: Bubblewrap Build
        working-directory: /tmp/twa-build
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          bubblewrap build \
            --signingKeyPath /tmp/karekod.jks \
            --signingKeyAlias karekod \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unibar-apk
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "UNIBAR APK"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
