name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK with correct structure
        run: |
          RUNNER_SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          MY_SDK="$HOME/my-android-sdk"
          
          # Yazılabilir SDK dizini kur
          mkdir -p "$MY_SDK/cmdline-tools"
          
          # cmdline-tools/latest: runner'dakini symlink et
          LATEST_SRC=$(ls "$RUNNER_SDK/cmdline-tools/" | grep -v "^$" | head -1)
          echo "Runner cmdline-tools içeriği: $(ls $RUNNER_SDK/cmdline-tools/)"
          echo "Kullanılacak: $LATEST_SRC"
          ln -sf "$RUNNER_SDK/cmdline-tools/$LATEST_SRC" "$MY_SDK/cmdline-tools/latest"
          
          # build-tools, platforms, platform-tools, licenses symlink
          ln -sf "$RUNNER_SDK/build-tools"    "$MY_SDK/build-tools"
          ln -sf "$RUNNER_SDK/platforms"      "$MY_SDK/platforms"
          ln -sf "$RUNNER_SDK/platform-tools" "$MY_SDK/platform-tools"
          ln -sf "$RUNNER_SDK/licenses"       "$MY_SDK/licenses"
          
          echo "MY_SDK=$MY_SDK" >> $GITHUB_ENV
          
          # Doğrula
          echo "--- MY_SDK yapısı ---"
          ls -la "$MY_SDK/"
          echo "--- sdkmanager binary ---"
          ls -la "$MY_SDK/cmdline-tools/latest/bin/sdkmanager" 2>/dev/null || echo "HATA: sdkmanager bulunamadı"

      - name: Configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$MY_SDK" > $HOME/.bubblewrap/config.json
          echo "Config:"
          cat $HOME/.bubblewrap/config.json

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks

      - name: Create twa-manifest.json
        run: |
          mkdir -p /tmp/twa-build
          cat > /tmp/twa-build/twa-manifest.json << 'JSONEOF'
          {
            "packageId": "com.unicasoft.unibar",
            "host": "unicasoft.github.io",
            "name": "UNIBAR",
            "launcherName": "UNIBAR",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a1628",
            "navigationColor": "#0a1628",
            "backgroundColor": "#0a1628",
            "enableNotifications": false,
            "startUrl": "/ebis/",
            "iconUrl": "https://unicasoft.github.io/ebis/icons/icon-512.png",
            "maskableIconUrl": "https://unicasoft.github.io/ebis/icons/icon-maskable.png",
            "appVersion": "32",
            "appVersionCode": 32,
            "signingKey": {"path": "/tmp/karekod.jks", "alias": "karekod"},
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://unicasoft.github.io/ebis/",
            "minSdkVersion": 21,
            "features": {},
            "alphaDependencies": {"enabled": false},
            "additionalTrustedOrigins": [],
            "shortcuts": []
          }
          JSONEOF

      - name: Bubblewrap Build
        working-directory: /tmp/twa-build
        run: |
          export ANDROID_HOME="$MY_SDK"
          export ANDROID_SDK_ROOT="$MY_SDK"
          bubblewrap build \
            --signingKeyPath /tmp/karekod.jks \
            --signingKeyAlias karekod \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unibar-apk
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "UNIBAR APK"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
