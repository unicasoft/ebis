name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: SDK & JDK Diagnostics
        run: |
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "=== ANDROID_HOME: $SDK ==="
          echo "=== JAVA_HOME: $JAVA_HOME ==="
          echo "--- java binary ---"
          ls -la "$JAVA_HOME/bin/java" 2>&1 || echo "NOT FOUND"
          "$JAVA_HOME/bin/java" -version 2>&1 || echo "java failed"
          echo "--- SDK build-tools ---"
          ls "$SDK/build-tools/" 2>/dev/null || echo "build-tools yok"
          echo "--- aapt2 in build-tools ---"
          ls "$SDK/build-tools/34.0.0/aapt2" 2>/dev/null || echo "aapt2 yok"
          echo "--- platforms ---"
          ls "$SDK/platforms/" 2>/dev/null || echo "platforms yok"
          echo "--- bubblewrap version ---"
          bubblewrap --version 2>&1 || true

      - name: Test AndroidSdk validation via Node
        run: |
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          node -e "
          const path = require('path');
          const fs = require('fs');
          const sdk = '$SDK';
          const jdk = process.env.JAVA_HOME;
          console.log('SDK:', sdk);
          console.log('JDK:', jdk);
          console.log('SDK exists:', fs.existsSync(sdk));
          console.log('build-tools exists:', fs.existsSync(path.join(sdk,'build-tools')));
          console.log('platforms exists:', fs.existsSync(path.join(sdk,'platforms')));
          console.log('java exists:', fs.existsSync(path.join(jdk,'bin','java')));
          console.log('aapt2 exists:', fs.existsSync(path.join(sdk,'build-tools','34.0.0','aapt2')));
          const dirs = fs.readdirSync(path.join(sdk,'build-tools'));
          console.log('build-tools dirs:', dirs);
          const plats = fs.readdirSync(path.join(sdk,'platforms'));
          console.log('platforms dirs:', plats);
          "

      - name: Configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          JDK="$JAVA_HOME"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JDK" "$SDK" > $HOME/.bubblewrap/config.json
          cat $HOME/.bubblewrap/config.json

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks

      - name: Create twa-manifest.json
        run: |
          mkdir -p /tmp/twa-build
          cat > /tmp/twa-build/twa-manifest.json << 'JSONEOF'
          {
            "packageId": "com.unicasoft.unibar",
            "host": "unicasoft.github.io",
            "name": "UNIBAR",
            "launcherName": "UNIBAR",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a1628",
            "navigationColor": "#0a1628",
            "backgroundColor": "#0a1628",
            "enableNotifications": false,
            "startUrl": "/ebis/",
            "iconUrl": "https://unicasoft.github.io/ebis/icons/icon-512.png",
            "maskableIconUrl": "https://unicasoft.github.io/ebis/icons/icon-maskable.png",
            "appVersion": "32",
            "appVersionCode": 32,
            "signingKey": {"path": "/tmp/karekod.jks", "alias": "karekod"},
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://unicasoft.github.io/ebis/",
            "minSdkVersion": 21,
            "features": {},
            "alphaDependencies": {"enabled": false},
            "additionalTrustedOrigins": [],
            "shortcuts": []
          }
          JSONEOF
          cat /tmp/twa-build/twa-manifest.json

      - name: Bubblewrap Build
        working-directory: /tmp/twa-build
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          bubblewrap build \
            --signingKeyPath /tmp/karekod.jks \
            --signingKeyAlias karekod \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unibar-apk
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "UNIBAR APK"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
