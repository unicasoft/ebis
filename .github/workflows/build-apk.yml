name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks

      - name: Bubblewrap Init
        run: |
          mkdir -p /tmp/twa-build
          cd /tmp/twa-build
          bubblewrap init --manifest https://unicasoft.github.io/ebis/manifest.json \
            --directory /tmp/twa-build 2>&1 || true

      - name: Configure twa-manifest.json
        run: |
          cat > /tmp/twa-build/twa-manifest.json << 'TWAJSON'
          {
            "packageId": "com.unicasoft.karekod",
            "host": "unicasoft.github.io",
            "name": "Karekod Doğrulayıcı",
            "launcherName": "Karekod",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a1628",
            "navigationColor": "#0a1628",
            "backgroundColor": "#0a1628",
            "enableNotifications": false,
            "startUrl": "/ebis/",
            "iconUrl": "https://unicasoft.github.io/ebis/icons/icon-512.png",
            "maskableIconUrl": "https://unicasoft.github.io/ebis/icons/icon-maskable.png",
            "appVersion": "32",
            "appVersionCode": 32,
            "signingKey": {
              "path": "/tmp/karekod.jks",
              "alias": "karekod"
            },
            "signingKeyPassword": "${{ secrets.KEY_PASSWORD }}",
            "signingKeyStorePassword": "${{ secrets.KEY_PASSWORD }}",
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://unicasoft.github.io/ebis/",
            "minSdkVersion": 19,
            "features": {},
            "alphaDependencies": { "enabled": false },
            "additionalTrustedOrigins": [],
            "shortcuts": []
          }
          TWAJSON

      - name: Bubblewrap Build
        run: |
          cd /tmp/twa-build
          bubblewrap build \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: karekod-apk
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Karekod APK"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
