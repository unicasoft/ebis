name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platform-tools platforms;android-34'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & patch Bubblewrap
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Bubblewrap kuruluyor..."
          npm install -g @bubblewrap/cli
          SDK_FILE=$(find / -path "*/bubblewrap/core/dist/lib/AndroidSdk.js" 2>/dev/null | head -1)
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] SDK_FILE: $SDK_FILE"
          if [ -n "$SDK_FILE" ]; then
            sed -i 's/async validateSdk()/async validateSdk_ORIG()/g' "$SDK_FILE"
            sed -i '/async validateSdk_ORIG/i\    async validateSdk() { return true; }' "$SDK_FILE"
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Patch OK"
          fi

      - name: Configure Bubblewrap
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Bubblewrap yapılandırılıyor..."
          mkdir -p $HOME/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > $HOME/.bubblewrap/config.json
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Config: $(cat $HOME/.bubblewrap/config.json)"

      - name: Decode Keystore
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Keystore çözülüyor..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Keystore hazır"

      - name: Create twa-manifest.json
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] twa-manifest.json oluşturuluyor (build #${{ github.run_number }})..."
          mkdir -p /tmp/twa-build
          cat > /tmp/twa-build/twa-manifest.json << JSONEOF
          {
            "packageId": "com.unicasoft.unibar",
            "host": "unicasoft.github.io",
            "name": "UNIBAR",
            "launcherName": "UNIBAR",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a1628",
            "navigationColor": "#0a1628",
            "backgroundColor": "#0a1628",
            "enableNotifications": false,
            "startUrl": "/ebis/",
            "iconUrl": "https://unicasoft.github.io/ebis/icons/icon-512.png",
            "maskableIconUrl": "https://unicasoft.github.io/ebis/icons/icon-maskable.png",
            "appVersion": "${{ github.run_number }}",
            "appVersionCode": ${{ github.run_number }},
            "signingKey": {"path": "/tmp/karekod.jks", "alias": "karekod"},
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://unicasoft.github.io/ebis/",
            "minSdkVersion": 21,
            "features": {},
            "alphaDependencies": {"enabled": false},
            "additionalTrustedOrigins": [],
            "shortcuts": []
          }
          JSONEOF
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Manifest hazır: appVersionCode=${{ github.run_number }}"

      - name: Bubblewrap Init
        working-directory: /tmp/twa-build
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Bubblewrap init başlıyor..."
          sudo apt-get install -y expect -q
          expect << 'EXPECTEOF'
          set timeout 120
          spawn bubblewrap init --manifest https://unicasoft.github.io/ebis/manifest.json
          while 1 {
            expect {
              eof     { break }
              timeout { break }
              "Key store location:" { send "/tmp/karekod.jks\r"; sleep 0.2 }
              "Key name:"           { send "karekod\r"; sleep 0.2 }
              "First and Last"      { send "Unicasoft\r"; sleep 0.2 }
              "Organizational unit" { send "Dev\r"; sleep 0.2 }
              "Organization:"       { send "Unicasoft\r"; sleep 0.2 }
              "City"                { send "Istanbul\r"; sleep 0.2 }
              "State"               { send "Istanbul\r"; sleep 0.2 }
              "Country"             { send "TR\r"; sleep 0.2 }
              -re {\?}             { send "\r"; sleep 0.1 }
            }
          }
          EXPECTEOF
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Init tamamlandı, dosyalar:"
          ls -la /tmp/twa-build/

      - name: Bubblewrap Build
        working-directory: /tmp/twa-build
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Bubblewrap build başlıyor (build #${{ github.run_number }})..."
          expect << 'EXPECTEOF'
          set timeout 600
          spawn bubblewrap build \
            --signingKeyPath /tmp/karekod.jks \
            --signingKeyAlias karekod \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"
          expect "Y/n"
          send "n\r"
          expect "Key Store:"
          send "${{ secrets.KEY_PASSWORD }}\r"
          expect "alias karekod:"
          send "${{ secrets.KEY_PASSWORD }}\r"
          expect eof
          EXPECTEOF
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Build tamamlandı"
          ls -la /tmp/twa-build/*.apk 2>/dev/null || echo "APK bulunamadı"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unibar-apk-${{ github.run_number }}
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "UNIBAR APK (build #${{ github.run_number }})"
          body: "Build #${{ github.run_number }} | Run ID: ${{ github.run_id }}"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
