name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept SDK licenses & install build tools
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          python3 -c "
import json, os
cfg = {
  'jdkPath': os.environ['JAVA_HOME'],
  'androidSdkPath': os.path.expanduser('~/android-sdk')
}
with open(os.path.expanduser('~/.bubblewrap/config.json'), 'w') as f:
    json.dump(cfg, f, indent=2)
print('Config:', open(os.path.expanduser('~/.bubblewrap/config.json')).read())
"

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/karekod.jks

      - name: Create twa-manifest.json
        run: |
          mkdir -p /tmp/twa-build
          python3 -c "
import json
m = {
  'packageId': 'com.unicasoft.unibar',
  'host': 'unicasoft.github.io',
  'name': 'UNIBAR',
  'launcherName': 'UNIBAR',
  'display': 'standalone',
  'orientation': 'portrait',
  'themeColor': '#0a1628',
  'navigationColor': '#0a1628',
  'backgroundColor': '#0a1628',
  'enableNotifications': False,
  'startUrl': '/ebis/',
  'iconUrl': 'https://unicasoft.github.io/ebis/icons/icon-512.png',
  'maskableIconUrl': 'https://unicasoft.github.io/ebis/icons/icon-maskable.png',
  'appVersion': '32',
  'appVersionCode': 32,
  'signingKey': {'path': '/tmp/karekod.jks', 'alias': 'karekod'},
  'splashScreenFadeOutDuration': 300,
  'enableSiteSettingsShortcut': True,
  'isChromeOSOnly': False,
  'isMetaQuest': False,
  'fullScopeUrl': 'https://unicasoft.github.io/ebis/',
  'minSdkVersion': 21,
  'features': {},
  'alphaDependencies': {'enabled': False},
  'additionalTrustedOrigins': [],
  'shortcuts': []
}
with open('/tmp/twa-build/twa-manifest.json', 'w') as f:
    json.dump(m, f, indent=2)
print('Manifest OK')
"

      - name: Bubblewrap Build
        working-directory: /tmp/twa-build
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          bubblewrap build \
            --signingKeyPath /tmp/karekod.jks \
            --signingKeyAlias karekod \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeyStorePassword "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unibar-apk
          path: /tmp/twa-build/app-release-signed.apk
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "UNIBAR APK"
          files: /tmp/twa-build/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
